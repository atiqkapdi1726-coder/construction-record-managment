<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initApp()">

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
    <h2>ConstructPro</h2>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('customers')">Customers</button>
    <button onclick="showSection('projects')">Projects</button>
    <button onclick="showSection('requirements')">Requirements</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- Main -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
    <h1>Dashboard</h1>
    <div class="cards">
        <div>Total Customers: <span id="totalCustomers"></span></div>
        <div>Total Projects: <span id="totalProjects"></span></div>
    </div>
</div>

<!-- CUSTOMERS -->
<div id="customers" class="section">
<h2>Customers</h2>
<input id="cname" placeholder="Name">
<input id="cphone" placeholder="Phone">
<button onclick="addCustomer()">Add</button>
<ul id="customerList"></ul>
</div>

<!-- PROJECTS -->
<div id="projects" class="section">
<h2>Projects</h2>
<input id="project" placeholder="Project">
<input id="engineer" placeholder="Engineer">
<select id="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>
<input id="cost" placeholder="Cost">
<button onclick="addProject()">Add</button>

<input id="search" placeholder="Search..." onkeyup="searchProject()">

<table>
<thead>
<tr>
<th>Project</th>
<th>Engineer</th>
<th>Status</th>
<th>Cost</th>
<th>Action</th>
</tr>
</thead>
<tbody id="projectTable"></tbody>
</table>
</div>

<!-- REQUIREMENTS -->
<div id="requirements" class="section">
<h2>Requirements</h2>
<input id="reqCustomer" placeholder="Customer">
<input id="reqDetail" placeholder="Requirement">
<button onclick="addRequirement()">Add</button>
<ul id="reqList"></ul>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
